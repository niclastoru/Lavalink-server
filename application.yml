server:
  port: 2333
  address: 0.0.0.0

lavalink:
  plugins:
    - dependency: "dev.lavalink.youtube:youtube-plugin:1.11.0"
      snapshot: false
    - dependency: "com.github.topi314.lavasrc:lavasrc-plugin:4.0.0"
      snapshot: false

  server:
    password: "youshallnotpass"
    sources:
      youtube: true
      soundcloud: true
      bandcamp: true
      twitch: true
      vimeo: true
      http: true
      local: false
    bufferDurationMs: 400
    frameBufferDurationMs: 5000
    youtubePlaylistLoadLimit: 6
    playerUpdateInterval: 5
    youtubeSearchEnabled: true
    soundcloudSearchEnabled: true

  plugins:
    youtube:
      enabled: true
      allowSearch: true
      allowDirectVideoIds: true
      allowDirectPlaylistIds: true
      clients:
        - MUSIC
        - WEB
        - ANDROID
        - IOS
    lavasrc:
      providers:
        - "ytsearch:\"%ISRC%\""
        - "ytsearch:%QUERY%"
        - "scsearch:%QUERY%"
      sources:
        spotify: true
        apple-music: false
        deezer: false
        yandex-music: false
        flowery-tts: false
        youtube: true
      spotify:
        clientId: "4a4f5a1f7a3b4c5d6e7f8a9b0c1d2e3f"
        clientSecret: "7a8b9c0d1e2f3a4b5c6d7e8f9a0b1c2d"
        countryCode: "DE"
        playlistLoadLimit: 6
        albumLoadLimit: 6

metrics:
  prometheus:
    enabled: false

sentry:
  dsn: ""

logging:
  file:
    path: ./logs/
  logback:
    rollingpolicy:
      max-history: 30
  level:
    root: INFO
    lavalink: INFO
